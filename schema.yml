components:
  schemas:
    Conversation:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        client:
          allOf:
          - $ref: '#/components/schemas/UserProfile'
          readOnly: true
        agent:
          allOf:
          - $ref: '#/components/schemas/UserProfile'
          readOnly: true
        status:
          $ref: '#/components/schemas/ConversationStatusEnum'
        subject:
          type: string
          nullable: true
          maxLength: 300
        created_at:
          type: string
          format: date-time
          readOnly: true
        closed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
          readOnly: true
      required:
      - agent
      - client
      - closed_at
      - created_at
      - id
      - messages
    ConversationAssign:
      type: object
      properties:
        agent:
          type: integer
          nullable: true
      required:
      - agent
    ConversationCreate:
      type: object
      properties:
        subject:
          type: string
          nullable: true
          maxLength: 300
    ConversationStatusEnum:
      enum:
      - OUVERTE
      - EN_ATTENTE
      - FERMÉE
      type: string
      description: |-
        * `OUVERTE` - Ouverte
        * `EN_ATTENTE` - En attente
        * `FERMÉE` - Fermée
    CoverageTypeEnum:
      enum:
      - VIE
      - DÉCÈS_INVALIDITÉ
      - MULTIRISQUE
      type: string
      description: |-
        * `VIE` - Assurance Vie
        * `DÉCÈS_INVALIDITÉ` - Décès et Invalidité
        * `MULTIRISQUE` - Multirisque
    CreditDocument:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        credit:
          type: integer
        document_type:
          $ref: '#/components/schemas/DocumentTypeEnum'
        file:
          type: string
          format: uri
        uploaded_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - credit
      - document_type
      - file
      - id

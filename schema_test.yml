openapi: 3.0.3
info:
  title: API COFINANCE CI
  version: 1.0.0
  description: |-
    Documentation complète de la plateforme de gestion de microcrédits et assurances mobiles COFINANCE CI.

    ## Authentification
    Utilisez `/api/auth/login/` pour obtenir un token JWT, puis ajoutez `Authorization: Bearer <token>` dans vos requêtes.

    ## Comptes de démonstration
    - **Admin** : `admin` / `Admin1234!`
    - **Agent** : `agent1` / `Agent1234!`
    - **Client** : `client1` / `Client1234!`
paths:
  /api/auth/register/:
    post:
      operationId: api_auth_register_create
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegistration'
          description: ''
  /api/auth/login/:
    post:
      operationId: api_auth_login_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
